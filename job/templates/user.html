{% load static%}

{% block body%}

{% include 'navigation.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function checkpassword() {
    if (document.signupuser.password.value != document.signupuser.Cpassword.value) {
      alert("Password and Confirm password field do not match");
      document.signupuser.Cpassword.focus();
      return false;
    }
    return true;
  }
</script>

<style>
    body {
      background-color: #f0f2f5;
    }
    .form-container {
      max-width: 500px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    .form-title {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .btn-custom {
      width: 100%;
    }
    .bottom-link {
      text-align: center;
      margin-top: 10px;
    }
    .radio-group {
      margin-bottom: 15px;
    }
</style>

<div class="form-container">
    <div class="form-title">Sign Up</div>
    <form method="post" name="signupuser" enctype="multipart/form-data" onsubmit="return checkpassword();">
        {% csrf_token %}
        <div class="row">
            <div class="col">
                <label for="First name" class="form-label">First Name</label>
                <input type="text" class="form-control mb-3" name="name" placeholder="Enter your name" required>
            </div>
            <div class="col">
                <label for="last name" class="form-label">Last Name</label>
                <input type="text" class="form-control mb-3" name="surname" placeholder="Enter your last name" required>
            </div>
        </div>

        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control mb-3" name="email" placeholder="Enter your email" required>

        <label for="number" class="form-label">Number</label>
        <input type="text" class="form-control mb-3" name="number" placeholder="Enter 10-digit number" maxlength="10" required>

        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>

        <label for="Cpassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control mb-3" name="Cpassword" placeholder="Confirm Password" required>
        
        <label for="gender" class="form-label">Gender</label>
        <div class="radio-group">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="male" required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="female">
            <label class="form-check-label" for="female">Female</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="other">
            <label class="form-check-label" for="other">Other</label>
          </div>
        </div>
    
        <label for="country" class="form-label" >Country</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <label for="state" class="form-label" >State</label>
        <div class="row">
          <div class="col">
            <select class="form-select mb-3" id="country" name="country" required>
              <option value="">Select Country</option>
              <option value="India">India</option>
              <option value="USA">USA</option>
              <option value="UK">UK</option>
            </select>
          </div>
          <div class="col">
            <select class="form-select mb-3" id="state" name="state" required>
              <option value=" ">Select State</option>
            </select>
          </div>
        </div>
        <div class="radio-group">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="experience" id="fresher" required>
            <label class="form-check-label" for="fresher">Fresher</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="experience" id="experienced">
            <label class="form-check-label" for="experienced">Experienced</label>
          </div>
        </div>
        <div id="experience-details" style="display: none; margin-top: 20px;">
            <input type="text" class="form-control mb-3" placeholder="Years of Experience">
            <input type="text" class="form-control mb-3" placeholder="Last Company Name">
            <input type="text" class="form-control mb-3" placeholder="Key Skills">
          </div>
          <script>
            // Existing country-state code yahin rahe
          
            // Experience logic
            const fresherRadio = document.getElementById("fresher");
            const experiencedRadio = document.getElementById("experienced");
            const experienceDetails = document.getElementById("experience-details");
          
            fresherRadio.addEventListener("change", function () {
              if (this.checked) {
                experienceDetails.style.display = "none";
              }
            });
          
            experiencedRadio.addEventListener("change", function () {
              if (this.checked) {
                experienceDetails.style.display = "block";
              }
            });
          </script>
    

        <button type="submit" class="btn btn-primary btn-custom mb-2">Sign Up</button>
        <button type="button" class="btn btn-secondary btn-custom">Back</button>

        <div class="bottom-link">
            Already have an account? <a href="{% url 'loginuser' %}">Login here</a>
        </div>
    </form>
</div>

<!-- JavaScript for Country-State -->
<script>
  const countryState = {
    India: ["Madhya Pradesh", "Maharashtra", "Delhi", "Gujarat", "Rajasthan"],
    USA: ["California", "Texas", "Florida", "New York"],
    UK: ["England", "Scotland", "Wales", "Northern Ireland"]
  };

  const countrySelect = document.getElementById("country");
  const stateSelect = document.getElementById("state");

  countrySelect.addEventListener("change", function () {
    const selectedCountry = this.value;
    const states = countryState[selectedCountry] || [];

    // Clear old options
    stateSelect.innerHTML = '<option value="">Select State</option>';

    // Add new options
    states.forEach(state => {
      const option = document.createElement("option");
      option.value = state;
      option.textContent = state;
      stateSelect.appendChild(option);
    });
  });
</script>


{% if error == "no"%}
<script>
  alert("sign up Successfully");
  window.location = (' {% url "loginuser" %}')
</script>
{% endif %}
{% if error == "yes"%}
<script>
  alert("Somthing went wrong , Try Again...");
  window.location = (' {% url "user" %}')
</script>
{% endif %}

{% endblock %}
