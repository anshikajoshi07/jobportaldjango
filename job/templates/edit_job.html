{% load static %}
{% block body %}

{% include 'rec_nav.html' %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f4f4;
        padding: 10px;
    }
    .edit-container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }
</style>

<div class="edit-container">
    <h3 class="text-center">Edit Job Post</h3>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Job Title</label>
            <input type="text" class="form-control" name="title" value="{{ job.title }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" class="form-control" name="company" value="{{ job.company }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" name="location" value="{{ job.location }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Type</label>
            <select class="form-control" name="jobtype" required>
                <option value="">Select Job Type</option>
                <option value="Full-Time" {% if job.jobtype == "Full-Time" %}selected{% endif %}>Full-Time</option>
                <option value="Part-Time" {% if job.jobtype == "Part-Time" %}selected{% endif %}>Part-Time</option>
                <option value="Remote" {% if job.jobtype == "Remote" %}selected{% endif %}>Remote</option>
                <option value="Internship" {% if job.jobtype == "Internship" %}selected{% endif %}>Internship</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Salary</label>
            <input type="text" class="form-control" name="salary" value="{{ job.salary }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea class="form-control" name="jobDescription" rows="4" required>{{ job.job_description }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Update Job</button>
    </form> 
</div>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
{% endif %}

{% endblock %}
