<!DOCTYPE html>
<html lang="en">
<head>
   {% load static %}
    <title>navigation</title>
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/responsive.css' %}" rel="stylesheet">
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="footer.css" rel="stylesheet"/>

<style>
    .navbar {
        padding: 10px 20px;
    }

    .nav-link {
        font-size: 1.05rem;
        padding: 8px 12px;
        margin: 0 8px;
        border: 1px solid #fff;
        border-radius: 5px;
        transition: all 0.25s ease-in-out;
    }

    .nav-link:hover {
        background-color: #198754;
        color: white !important;
    }

    .navbar-text-logo {
        font-weight: 900;
        font-size: 1.75rem;
        color: #0d9488;
        letter-spacing: 0.06em;
        text-shadow: 1px 1px 8px rgba(0,0,0,0.2);
    }

    .nav-link {
        font-size: 1.05rem;
        padding: 10px 14px;
        margin: 0 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        transition: all 0.25s ease-in-out;
        color: #0f172a;
        background: rgba(255,255,255,0.85);
    }

    .nav-link.active,
    .nav-link:hover {
        background-color: #0d9488;
        color: white !important;
        border: 1px solid #089d83;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
        transform: translateY(-1px);
    }

    .content-below {
        margin-top: 40px;
    }

    @media (max-width: 992px) {
        .navbar {
            padding: 8px 12px;
        }

        .nav-link {
            font-size: 0.95rem;
            margin: 0 5px;
            padding: 7px 10px;
        }

        .navbar .form-control {
            width: 100%;
            margin-bottom: 8px;
        }
    }

    @media (max-width: 768px) {
        .nav-link {
            font-size: 0.9rem;
            border: none;
            margin: 0;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
        }

        .navbar .nav-item {
            width: 100%;
        }

        .navbar .navbar-collapse {
            background: #f8f9fa;
        }

        .navbar-logo img {
            max-width: 180px;
        }

        .content-below {
            margin-top: 20px;
        }
    }
</style> 
</head>
<body>
<nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <div class="d-flex navbar-text-logo">
        <span>JobPortal</span>
      </div>
      <a class="navbar-brand"></a>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </nav>

 <!-- button  -->
 <div class="collapse" id="navbarToggleExternalContent" data-bs-theme="dark">
    <div class="bg-dark p-4">
      <h5 class="text-body-emphasis h4">JOB PORTAL</h5>
      <span class="text-body-secondary">WE ARE PROVIDING YOU PLACE </span>
    </div>
  </div>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

<!-- nav bar code -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active fs-5 " aria-current="Home" href="{% url 'index' %}">Home</a>
          </li>
          {% comment %} <li class="nav-item">
            <a class="nav-link fs-5 " href="{% url 'latest_jobs' %}">Latest Jobs</a>
          </li>{% endcomment %}
          <li class="nav-item dropdown"> 
             <a class="nav-link fs-5 " href="{% url 'about' %}">About</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle fs-5 " href=" " role="button" data-bs-toggle="dropdown" aria-expanded="false">
              User
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{% url 'user' %}">
                <i class="bi bi-person-fill"></i>Sign Up</a>
              </li>
              <li><a class="dropdown-item" href="{% url 'loginuser' %}">
                <i class="bi bi-person-fill"></i> Sign In</a>
              </li>
            </ul>
              
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle  " href=" " role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Recruiter
                </a>
                <ul class="dropdown-menu">
              
              <li><a class="dropdown-item" href="{% url 'recurater' %}"> 
                 <i class="bi bi-person-fill"></i>Sign Up</a>
              </li> 
              <li><a class="dropdown-item" href="{% url 'loginreq' %}">
                <i class="bi bi-person-fill"></i> Sign In</a>
              </li>
      
            </ul>

             
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle fs-5 " href=" " role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Admin
                </a>
                <ul class="dropdown-menu">    
              <li><a class="dropdown-item" href="{% url 'admin_cre' %}">
                <i class="bi bi-person-fill"></i>Sign UP</a>
              </li>

              <li><a class="dropdown-item" href="{% url 'loginadmin' %}">
                <i class="bi bi-person-fill"></i> Sign In</a>
              </li>

              </ul>
            </ul>
          </li>
            
        </ul>
      </div>
    </div>
  </nav>

</body>
</html>
