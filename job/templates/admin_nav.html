<!DOCTYPE html>
<html lang="en">
<head>
   {% load static %}

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/responsive.css' %}" rel="stylesheet">

<style>
    body {
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
    }

    .navbar {
        padding: 10px 20px;
    }

    .nav-link {
        font-size: 1.05rem;
        padding: 8px 12px;
        margin: 0 8px;
        border: 1px solid #fff;
        border-radius: 5px;
        transition: all 0.25s ease-in-out;
    }

    .nav-link:hover {
        background-color: #198754;
        color: white !important;
    }

    .navbar-text-logo {
        font-weight: 800;
        font-size: 1.6rem;
        color: #25a88b;
        letter-spacing: 0.04em;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
    }

    .content-below {
        margin-top: 20px;
    

    @media (max-width: 992px) {
        .navbar {
            padding: 8px 12px;
        }

        .nav-link {
            font-size: 0.95rem;
            margin: 0 5px;
            padding: 7px 10px;
        }

        .navbar .form-control {
            width: 100%;
            margin-bottom: 8px;
        }
    }

    @media (max-width: 768px) {
        .nav-link {
            font-size: 0.9rem;
            border: none;
            margin: 0;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
        }

        .navbar .nav-item {
            width: 100%;
        }

        .navbar .navbar-collapse {
            background: #f8f9fa;
        }

        .navbar-logo img {
            max-width: 180px;
        }

        .content-below {
            margin-top: 16px;
        }
    }
</style>
