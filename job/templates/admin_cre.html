{% load static %}

{% block body%}

{% include 'navigation.html' %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
    body {
      background-color: #f0f2f5;
      front-family:Arial,sans-serif;
    }
    .form-container {
      max-width: 500px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    .form-title {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .btn-custom {
      width: 100%;
    }
    .bottom-link {
      text-align: center;
      margin-top: 10px;
    }
    .radio-group {
      margin-bottom: 15px;
    }
  </style>




<div class="container ">
    <h2 class="text-center">Apply for Admin Account</h2>
   

    <form method="POST" action="{% url 'admin_cre' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <div class="mb-3">
            <label for="admin_post" class="form-label">Admin Post</label>
            <select class="form-control" id="admin_post" name="admin_post" required>
                <option value="">Select Admin Post</option>
                <option value="HR">HR</option>
                <option value="Recruitment Manager">Recruitment Manager</option>
                <option value="Technical Head">Technical Head</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="education" class="form-label">Education</label>
            <input type="text" class="form-control" id="education" name="education" required>
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number (Optional)</label>
            <input type="tel" class="form-control" id="phone" name="phone">
        </div>

        <div class="mb-3">
            <label for="aadhaar" class="form-label">Aadhaar Number (Optional)</label>
            <input type="text" class="form-control" id="aadhaar" name="aadhaar">
        </div>

        <div class="mb-3">
            <label for="experience" class="form-label">Experience (in years)</label>
            <input type="number" class="form-control" id="experience" name="experience" required>
        </div>

        <div class="mb-3">
            <label for="current_job" class="form-label">Current Job</label>
            <input type="text" class="form-control" id="current_job" name="current_job" required>
        </div>

        <button type="submit" class="btn btn-primary">Apply for Admin</button>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const form = document.querySelector('form');
                form.addEventListener('submit', function (e) {
                    setTimeout(function () {
                        form.reset();
                    }, 100); // slight delay to let Django process
                });
            });
        </script>
    </form>
</div>


{% endblock%}
